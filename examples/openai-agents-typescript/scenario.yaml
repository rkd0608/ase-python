scenario_id: openai-agents-typescript-example
name: OpenAI Agents TypeScript Example
description: Deterministic TypeScript example for ASE adapter workflows.
agent:
  command:
    - node
    - examples/openai-agents-typescript/agent.ts
  timeout_seconds: 60
agent_runtime:
  mode: adapter
  framework: openai-agents-js
  language: typescript
  adapter_name: openai-agents-typescript
  event_source: events.generated.jsonl
assertions:
  - evaluator: tool_called
    params:
      kind: http_api
      minimum: 1
  - evaluator: max_tool_calls
    params:
      maximum: 1
tags:
  - framework-openai-agents-js
