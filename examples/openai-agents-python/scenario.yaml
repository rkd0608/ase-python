scenario_id: openai-agents-python-example
name: OpenAI Agents Python Example
description: Wrapper example around the real upstream OpenAI Agents harness.
agent:
  command:
    - python3
    - examples/openai-agents-python/agent.py
  timeout_seconds: 60
agent_runtime:
  mode: adapter
  framework: openai-agents
  language: python
  adapter_name: openai-agents-python
  event_source: events.generated.jsonl
session:
  enabled: true
  session_id: sess-openai-example
assertions:
  - evaluator: tool_called
    params:
      kind: http_api
      minimum: 1
  - evaluator: max_tool_calls
    params:
      maximum: 1
tags:
  - framework-openai-agents
