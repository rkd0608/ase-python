scenario_id: case-openai-prompt-regression-bad
name: OpenAI Agents Prompt Regression (Bad)
description: >
  Demonstrates a silent regression where the same refund tool fires twice after
  a prompt or model change.

agent:
  command:
    - .upstream/openai-agents-python/.venv/bin/python
    - validation/case_studies/openai_prompt_regression/ase_agent.py
    - --variant
    - bad
  timeout_seconds: 60

agent_runtime:
  mode: adapter
  framework: openai-agents
  language: python
  adapter_name: openai-agents-python
  event_source: events.bad.jsonl

session:
  enabled: true
  session_id: sess-openai-regression

assertions:
  - evaluator: tool_called
    params:
      kind: http_api
      minimum: 1
  - evaluator: max_tool_calls
    params:
      maximum: 1

tags:
  case_study: prompt-regression
  variant: bad
