scenario_id: case-openai-prompt-regression-fixed
name: OpenAI Agents Prompt Regression (Fixed)
description: >
  Demonstrates the corrected OpenAI Agents run after ASE exposed duplicate tool
  usage.

agent:
  command:
    - .upstream/openai-agents-python/.venv/bin/python
    - validation/case_studies/openai_prompt_regression/ase_agent.py
    - --variant
    - fixed
  timeout_seconds: 60

agent_runtime:
  mode: adapter
  framework: openai-agents
  language: python
  adapter_name: openai-agents-python
  event_source: events.fixed.jsonl

session:
  enabled: true
  session_id: sess-openai-regression

assertions:
  - evaluator: tool_called
    params:
      kind: http_api
      minimum: 1
  - evaluator: max_tool_calls
    params:
      maximum: 1

tags:
  - case_study-prompt-regression
  - variant-fixed
